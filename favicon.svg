<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#0c2411"/>
      <stop offset="60%" stop-color="#06110a"/>
      <stop offset="100%" stop-color="#030704"/>
    </radialGradient>
    <filter id="neon" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="11.5" fill="none" stroke="#1c7a33" stroke-opacity="0.5" stroke-width="1"/>

  <!-- FS monogram, neon tube -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="miter" filter="url(#neon)">
    <path d="M33 15 L18 15 L18 49 M18 30.5 L29 30.5" stroke="#31e654" stroke-width="6"/>
    <path d="M49 15 L35 15 L35 30 L49 30 L49 49 L35 49" stroke="#31e654" stroke-width="6"/>
    <path d="M33 15 L18 15 L18 49 M18 30.5 L29 30.5" stroke="#ccffd6" stroke-width="2"/>
    <path d="M49 15 L35 15 L35 30 L49 30 L49 49 L35 49" stroke="#ccffd6" stroke-width="2"/>
  </g>
</svg>
