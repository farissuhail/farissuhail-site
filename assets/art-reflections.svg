<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- ===== Reflections — Islamic 8-point geometry (line art) ===== -->
  <g stroke="#00ff85">
    <!-- outer + inner frame circles -->
    <circle cx="180" cy="196" r="98" stroke-opacity="0.28"/>
    <circle cx="180" cy="196" r="80" stroke-opacity="0.5" stroke-width="1.2"/>
    <!-- 8-point star: two overlaid squares -->
    <path d="M180,124 L252,196 L180,268 L108,196 Z" stroke-width="1.6"/>
    <path d="M129,145 L231,145 L231,247 L129,247 Z" stroke-width="1.6"/>
    <!-- inner ring + crescent -->
    <circle cx="180" cy="196" r="30" stroke-opacity="0.6"/>
    <path d="M188,182 a16,16 0 1 0 0,28 a13,13 0 1 1 0,-28 Z" stroke-width="1.4" fill="#00ff85" fill-opacity="0.12"/>
  </g>

  <!-- radial ticks -->
  <g stroke="#1fd980" stroke-width="1.4" stroke-opacity="0.7">
    <path d="M282,196 L294,196"/><path d="M66,196 L78,196"/>
    <path d="M180,94 L180,82"/><path d="M180,298 L180,310"/>
    <path d="M252,124 L260,116"/><path d="M108,268 L100,276"/>
    <path d="M252,268 L260,276"/><path d="M108,124 L100,116"/>
  </g>

  <!-- node dots at the star points -->
  <g fill="#9dffc4">
    <circle cx="180" cy="124" r="2.6"/><circle cx="252" cy="196" r="2.6"/>
    <circle cx="180" cy="268" r="2.6"/><circle cx="108" cy="196" r="2.6"/>
    <circle cx="129" cy="145" r="2.2"/><circle cx="231" cy="145" r="2.2"/>
    <circle cx="231" cy="247" r="2.2"/><circle cx="129" cy="247" r="2.2"/>
  </g>

  <!-- open book, line art, at the base -->
  <g stroke="#00ff85" stroke-width="1.5">
    <path d="M180,338 C158,330 134,332 114,342 L114,388 C134,378 158,376 180,384 Z"/>
    <path d="M180,338 C202,330 226,332 246,342 L246,388 C226,378 202,376 180,384 Z"/>
    <path d="M180,338 L180,384" stroke-opacity="0.8"/>
  </g>
  <g stroke="#1fd980" stroke-width="1" stroke-opacity="0.55">
    <path d="M126,348 L168,342"/><path d="M126,356 L168,350"/><path d="M126,364 L160,358"/>
    <path d="M192,342 L234,348"/><path d="M192,350 L234,356"/><path d="M200,358 L234,364"/>
  </g>

  <!-- corner dot grid -->
  <g fill="#1fd980" fill-opacity="0.55">
    <circle cx="316" cy="404" r="1.5"/><circle cx="330" cy="404" r="1.5"/><circle cx="344" cy="404" r="1.5"/>
    <circle cx="316" cy="418" r="1.5"/><circle cx="330" cy="418" r="1.5"/><circle cx="344" cy="418" r="1.5"/>
    <circle cx="316" cy="432" r="1.5"/><circle cx="330" cy="432" r="1.5"/><circle cx="344" cy="432" r="1.5"/>
  </g>
</svg>
