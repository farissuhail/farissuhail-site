<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" fill="none">
  <defs>
    <radialGradient id="rGlow" cx="50%" cy="58%" r="62%">
      <stop offset="0%" stop-color="#7dffb4" stop-opacity="0.5"/>
      <stop offset="42%" stop-color="#00ff85" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff85" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rArch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2c1d"/>
      <stop offset="100%" stop-color="#05130d"/>
    </linearGradient>
    <linearGradient id="rBook" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b6ffd8"/>
      <stop offset="100%" stop-color="#00d76c"/>
    </linearGradient>
    <filter id="rb1" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="rb2" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="11"/></filter>
  </defs>

  <ellipse cx="180" cy="276" rx="158" ry="178" fill="url(#rGlow)"/>

  <!-- mihrab arch -->
  <path d="M92,374 L92,182 C92,118 140,92 180,68 C220,92 268,118 268,182 L268,374 Z" fill="url(#rArch)" stroke="#00ff85" stroke-width="2.5"/>
  <path d="M104,368 L104,186 C104,130 146,106 180,86 C214,106 256,130 256,186 L256,368" stroke="#1fd980" stroke-width="1" opacity="0.45"/>

  <!-- stars -->
  <g fill="#cfffe6">
    <circle cx="150" cy="150" r="1.5"/><circle cx="232" cy="124" r="1.2"/><circle cx="138" cy="206" r="1"/>
    <circle cx="246" cy="196" r="1.3"/><circle cx="168" cy="118" r="1"/><circle cx="206" cy="214" r="1"/>
    <circle cx="124" cy="252" r="1"/><circle cx="252" cy="246" r="1.1"/><circle cx="190" cy="170" r="0.9"/>
  </g>

  <!-- crescent moon -->
  <g filter="url(#rb1)"><circle cx="204" cy="152" r="22" fill="#d8ffec"/><circle cx="215" cy="145" r="19" fill="#08180f"/></g>

  <!-- mosque silhouette -->
  <g fill="#0f3624" stroke="#1fd980" stroke-width="0.8" opacity="0.85">
    <path d="M118,326 q0,-22 16,-22 q16,0 16,22 Z"/>
    <path d="M150,326 q0,-36 30,-36 q30,0 30,36 Z"/>
    <path d="M210,326 q0,-22 16,-22 q16,0 16,22 Z"/>
    <rect x="114" y="304" width="3" height="22"/><rect x="243" y="304" width="3" height="22"/>
  </g>

  <!-- platform rings -->
  <g stroke="#00ff85" fill="none">
    <ellipse cx="180" cy="398" rx="108" ry="16" opacity="0.5"/>
    <ellipse cx="180" cy="396" rx="72" ry="10" opacity="0.65"/>
    <ellipse cx="180" cy="394" rx="40" ry="6" opacity="0.4"/>
  </g>

  <!-- rehal (X stand) -->
  <g stroke="#0b9457" stroke-width="6" stroke-linecap="round">
    <path d="M150,390 L196,352"/><path d="M210,390 L164,352"/>
  </g>

  <!-- glowing open Qur'an -->
  <g filter="url(#rb2)" opacity="0.85"><path d="M180,318 L128,332 L128,356 L180,346 L232,356 L232,332 Z" fill="#00ff85"/></g>
  <path d="M180,314 L126,330 L126,352 L180,342 L234,352 L234,330 Z" fill="url(#rBook)"/>
  <path d="M180,314 L180,342" stroke="#06160e" stroke-width="2.5"/>
  <g stroke="#06351f" stroke-width="1" opacity="0.5">
    <path d="M138,332 L172,325"/><path d="M138,338 L172,331"/>
    <path d="M188,325 L222,332"/><path d="M188,331 L222,338"/>
  </g>

  <!-- rising particles -->
  <g fill="#9dffc4">
    <circle cx="148" cy="296" r="1.6" opacity="0.85"/><circle cx="216" cy="286" r="1.5" opacity="0.7"/>
    <circle cx="182" cy="262" r="1.2" opacity="0.6"/><circle cx="160" cy="320" r="1.2" opacity="0.7"/>
  </g>
</svg>
