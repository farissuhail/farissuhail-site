<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" fill="none">
  <defs>
    <radialGradient id="rSun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eafff4"/>
      <stop offset="24%" stop-color="#9dffc6"/>
      <stop offset="58%" stop-color="#00ff85" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff85" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="rHalo" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#00ff85" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#00ff85" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="180" cy="206" rx="178" ry="186" fill="url(#rHalo)"/>

  <!-- stars -->
  <g fill="#cfffe6">
    <circle cx="70" cy="90" r="1.3"/><circle cx="120" cy="60" r="1"/><circle cx="250" cy="70" r="1.2"/>
    <circle cx="300" cy="110" r="1.3"/><circle cx="200" cy="50" r="1"/><circle cx="40" cy="150" r="1"/>
    <circle cx="324" cy="170" r="1.1"/><circle cx="160" cy="92" r="0.9"/>
  </g>

  <!-- sun -->
  <circle cx="180" cy="218" r="60" fill="url(#rSun)"/>
  <circle cx="180" cy="218" r="20" fill="#f2fff8"/>

  <!-- back ridge -->
  <path d="M0,302 L50,272 L96,288 L140,258 L180,274 L222,256 L270,286 L320,266 L360,290 L360,340 L0,340 Z" fill="#15402c" opacity="0.85"/>

  <!-- mid ridge with summit -->
  <path d="M0,334 L55,304 L106,314 L150,258 L180,206 L212,256 L262,306 L322,288 L360,322 L360,440 L0,440 Z" fill="#0a3a24"/>
  <path d="M150,258 L180,206 L212,256" stroke="#1fd980" stroke-width="1.2" opacity="0.5"/>

  <!-- lone figure on the summit (backlit silhouette) -->
  <g fill="#03110a" stroke="#03110a" stroke-width="2.6" stroke-linecap="round">
    <circle cx="180" cy="189" r="3.6"/>
    <path d="M180,193 L180,206"/>
    <path d="M180,197 L171,190"/><path d="M180,197 L189,190"/>
    <path d="M180,206 L176,213"/><path d="M180,206 L184,213"/>
  </g>

  <!-- front ridge -->
  <path d="M0,374 L70,346 L150,368 L210,350 L300,374 L360,354 L360,440 L0,440 Z" fill="#02100a"/>

  <!-- drifting light motes -->
  <g fill="#9dffc4">
    <circle cx="240" cy="250" r="1.6" opacity="0.8"/><circle cx="120" cy="270" r="1.5" opacity="0.7"/>
    <circle cx="280" cy="300" r="1.3" opacity="0.6"/><circle cx="90" cy="320" r="1.3" opacity="0.6"/>
  </g>
  <!-- corner dot grid (echoes the mockup) -->
  <g fill="#1fd980" opacity="0.5">
    <circle cx="318" cy="404" r="1.4"/><circle cx="330" cy="404" r="1.4"/><circle cx="342" cy="404" r="1.4"/>
    <circle cx="318" cy="416" r="1.4"/><circle cx="330" cy="416" r="1.4"/><circle cx="342" cy="416" r="1.4"/>
    <circle cx="318" cy="428" r="1.4"/><circle cx="330" cy="428" r="1.4"/><circle cx="342" cy="428" r="1.4"/>
  </g>
</svg>
