<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- ===== Kalam — geometric data observatory (line art) ===== -->
  <!-- concentric rings -->
  <g stroke="#22d3ee">
    <circle cx="180" cy="206" r="134" stroke-opacity="0.16"/>
    <circle cx="180" cy="206" r="104" stroke-opacity="0.45" stroke-dasharray="3 8"/>
    <circle cx="180" cy="206" r="74" stroke-opacity="0.7" stroke-width="1.2"/>
    <circle cx="180" cy="206" r="40" stroke-opacity="0.35" stroke-dasharray="2 7"/>
    <circle cx="180" cy="206" r="3.4" fill="#e0fbff" stroke="none"/>
  </g>

  <!-- radial spokes -->
  <g stroke="#22d3ee" stroke-width="1" stroke-opacity="0.22">
    <path d="M180,206 L180,72"/><path d="M180,206 L180,340"/>
    <path d="M180,206 L314,206"/><path d="M180,206 L46,206"/>
    <path d="M180,206 L275,111"/><path d="M180,206 L85,301"/>
    <path d="M180,206 L275,301"/><path d="M180,206 L85,111"/>
  </g>

  <!-- 40% data arc on the 104 ring -->
  <circle cx="180" cy="206" r="104" fill="none" stroke="#67e8f9" stroke-width="2.6"
          stroke-dasharray="262 392" transform="rotate(-90 180 206)" stroke-opacity="0.9"/>

  <!-- rising data polyline + nodes -->
  <path d="M120,250 L146,236 L166,242 L190,210 L214,196 L242,168" stroke="#e0fbff" stroke-width="1.8"/>
  <g fill="#a5f3fc">
    <circle cx="120" cy="250" r="2.6"/><circle cx="146" cy="236" r="2.2"/><circle cx="166" cy="242" r="2.2"/>
    <circle cx="190" cy="210" r="2.6"/><circle cx="214" cy="196" r="2.2"/><circle cx="242" cy="168" r="2.8"/>
  </g>

  <!-- chord network across the ring -->
  <g stroke="#67e8f9" stroke-width="0.9" stroke-opacity="0.5">
    <path d="M254,134 L108,278 M118,150 L262,250 M180,100 L268,232"/>
  </g>
  <g fill="#a5f3fc">
    <circle cx="254" cy="134" r="2.4"/><circle cx="108" cy="278" r="2.4"/><circle cx="118" cy="150" r="2.2"/>
    <circle cx="262" cy="250" r="2.2"/><circle cx="180" cy="100" r="2.4"/><circle cx="268" cy="232" r="2.2"/>
    <circle cx="84" cy="206" r="2"/><circle cx="276" cy="206" r="2"/>
  </g>

  <!-- ring ticks -->
  <g stroke="#22d3ee" stroke-width="1.3" stroke-opacity="0.6">
    <path d="M180,72 L180,60"/><path d="M180,340 L180,352"/>
    <path d="M314,206 L326,206"/><path d="M46,206 L34,206"/>
  </g>

  <!-- corner dot grid -->
  <g fill="#22d3ee" fill-opacity="0.55">
    <circle cx="316" cy="404" r="1.5"/><circle cx="330" cy="404" r="1.5"/><circle cx="344" cy="404" r="1.5"/>
    <circle cx="316" cy="418" r="1.5"/><circle cx="330" cy="418" r="1.5"/><circle cx="344" cy="418" r="1.5"/>
    <circle cx="316" cy="432" r="1.5"/><circle cx="330" cy="432" r="1.5"/><circle cx="344" cy="432" r="1.5"/>
  </g>
</svg>
