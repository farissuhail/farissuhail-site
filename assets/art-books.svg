<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" fill="none"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- ===== Book summaries — geometric open book (line art) ===== -->
  <!-- frame circle + arcs of radiating knowledge -->
  <g stroke="#5eaaff">
    <circle cx="180" cy="214" r="98" stroke-opacity="0.22"/>
    <path d="M120,150 A86,86 0 0 1 240,150" stroke-opacity="0.4" stroke-dasharray="3 8"/>
  </g>
  <!-- radiating lines above the spine -->
  <g stroke="#8ec9ff" stroke-width="1.3" stroke-opacity="0.7">
    <path d="M180,150 L180,120"/>
    <path d="M158,156 L146,130"/><path d="M202,156 L214,130"/>
    <path d="M138,168 L118,150"/><path d="M222,168 L242,150"/>
  </g>
  <g fill="#bcd9ff">
    <circle cx="180" cy="116" r="2.2"/><circle cx="144" cy="126" r="1.8"/><circle cx="216" cy="126" r="1.8"/>
    <circle cx="114" cy="146" r="1.6"/><circle cx="246" cy="146" r="1.6"/>
  </g>

  <!-- open book -->
  <g stroke="#5eaaff" stroke-width="1.8">
    <path d="M180,196 C152,184 120,186 96,200 L96,272 C120,258 152,256 180,268 Z"/>
    <path d="M180,196 C208,184 240,186 264,200 L264,272 C240,258 208,256 180,268 Z"/>
    <path d="M180,196 L180,268" stroke-opacity="0.85"/>
  </g>
  <!-- page text lines -->
  <g stroke="#8ec9ff" stroke-width="1" stroke-opacity="0.55">
    <path d="M110,210 L168,202"/><path d="M110,222 L168,214"/><path d="M110,234 L160,226"/><path d="M110,246 L168,238"/>
    <path d="M192,202 L250,210"/><path d="M192,214 L250,222"/><path d="M200,226 L250,234"/><path d="M192,238 L250,246"/>
  </g>
  <!-- bookmark ribbon -->
  <path d="M214,188 L214,236 L222,228 L230,236 L230,188" stroke="#bcd9ff" stroke-width="1.4" stroke-opacity="0.8"/>

  <!-- base shelf line + node dots -->
  <path d="M104,300 L256,300" stroke="#5eaaff" stroke-width="1.3" stroke-opacity="0.4"/>
  <g fill="#bcd9ff">
    <circle cx="96" cy="200" r="2.4"/><circle cx="264" cy="200" r="2.4"/>
    <circle cx="120" cy="300" r="2"/><circle cx="240" cy="300" r="2"/>
  </g>

  <!-- corner dot grid -->
  <g fill="#5eaaff" fill-opacity="0.55">
    <circle cx="316" cy="404" r="1.5"/><circle cx="330" cy="404" r="1.5"/><circle cx="344" cy="404" r="1.5"/>
    <circle cx="316" cy="418" r="1.5"/><circle cx="330" cy="418" r="1.5"/><circle cx="344" cy="418" r="1.5"/>
    <circle cx="316" cy="432" r="1.5"/><circle cx="330" cy="432" r="1.5"/><circle cx="344" cy="432" r="1.5"/>
  </g>
</svg>
