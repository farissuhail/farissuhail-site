1:{ar:"الفاتحة",type:"ring",src:"Michel Cuypers, Semitic rhetorical analysis; also treated by Farrin.",

  ["X","vv. 36–57","Dreams decoded — Joseph vindicated and raised","Prison dreams, then the king's dream; the women confess; “Today you are established and trusted” (12:54). Descent turns to ascent at the exact middle."],

18:{ar:"الكهف",type:"ring",src:"Contemporary coherence studies (e.g., Khan & Randhawa, Divine Speech, 2016). Popular, not peer-reviewed.",
 lede:"Four famous stories arranged as two mirrored pairs around a central parable — each story a trial: faith, wealth, knowledge, power.",
 secs:[

26:{ar:"الشعراء",type:"panels",refr:"إِنَّ فِي ذَٰلِكَ لَآيَةً ۖ وَمَا كَانَ أَكْثَرُهُم مُّؤْمِنِينَ",refrEn:"“Surely in that is a sign, yet most of them do not believe…” — closes every panel",

54:{ar:"القمر",type:"panels",refr:"وَلَقَدْ يَسَّرْنَا الْقُرْآنَ لِلذِّكْرِ فَهَلْ مِن مُّدَّكِرٍ",refrEn:"“We have made the Qur'an easy for remembrance — is there any who will remember?” — the tolling refrain",

55:{ar:"الرحمن",type:"panels",refr:"فَبِأَيِّ آلَاءِ رَبِّكُمَا تُكَذِّبَانِ",refrEn:"“Then which of your Lord's favors will you both deny?” — 31 times, addressed to humans and jinn in the dual",

  ["1","vv. 1–13","The Merciful teaches","Qur'an, humanity, speech; sun and moon in computed courses; the balance (mīzān) set up — do not cheat it."],

101:{ar:"القارعة",type:"ring",src:"Michel Cuypers, rhetorical analysis of the short surahs (A Qur'anic Apocalypse, 2018).",

112:{ar:"الإخلاص",type:"ring",src:"Michel Cuypers, rhetorical analysis of the short surahs.",

};

/* status computation */
function statusOf(n){
  if(RINGS[n]) return "ring";
  if(n>=81 && n<=114) return "cuy";
  if(n===4||n===24) return "part";
  return "un";
}
const STATUS_LABEL={ring:"Documented ring — mapped below",cuy:"Analyzed by Cuypers (Semitic rhetorical analysis)",part:"Partial / proposed structures",un:"No published ring map"};
const PART_NOTES={
 4:"Neal Robinson and others have analyzed Q4's thematic architecture (rights of women, orphans, inheritance framed by taqwā), but no consensus concentric map has been published.",
 24:"No whole-surah ring map — but the Verse of Light (24:35) is a famous mini-ring: the lamp / glass / star imagery folds concentrically around 'Light upon Light' (analysis in Khan & Randhawa, Divine Speech)."
};

/* ================= RENDER ================= */
const nav=document.getElementById('nav'), main=document.getElementById('main');
let current=0; // 0 = intro

function buildNav(filter=""){
  nav.innerHTML="";
  const intro=document.createElement('div');
  intro.className="srow top"+(current===0?" active":"");
  intro.innerHTML='<span class="num">◆</span><span class="nm">What is a ring? (start here)</span>';
  intro.onclick=()=>go(0);
  nav.appendChild(intro);
  const f=filter.trim().toLowerCase();
  for(let n=1;n<=114;n++){
    const [nm,en]=S[n-1];
    if(f && !(nm.toLowerCase().includes(f)||en.toLowerCase().includes(f)||String(n)===f)) continue;
    const st=statusOf(n);
    const row=document.createElement('div');
    row.className="srow"+(current===n?" active":"");
    row.innerHTML=`<span class="num">${n}</span><i class="dot d-${st==="ring"?"ring":st==="cuy"?"cuy":st==="part"?"part":"un"}"></i><span class="nm">${nm} · <span style="color:var(--muted)">${en}</span></span>`;
    row.onclick=()=>go(n);
    nav.appendChild(row);
  }
}
function go(n, skipHash){
  current=n;buildNav(document.getElementById('q').value);render();window.scrollTo({top:0,behavior:"smooth"});main.focus&&main.focus();
  if(!skipHash){
    try{ history.replaceState(null,'', n>0 ? ('#'+n) : (location.pathname+location.search)); }catch(e){}
  }
}

function tagHTML(n){
  const st=statusOf(n);
  const period=MEDINAN.has(n)?'<span class="tag med">Medinan</span>':'<span class="tag mec">Meccan</span>';
  const stTag=`<span class="tag ${st==="ring"?"ring":st==="cuy"?"cuy":st==="part"?"part":"un"}">${STATUS_LABEL[st]}</span>`;
  return period+" "+stTag;
}

function ladderHTML(r,n){
  const secs=r.secs;
  const isPanels=r.type==="panels";
  /* compute mirror pairs for ring type: i <-> len-1-i (last entry of Q101 is merged frame) */
  let rows="";
  secs.forEach((s,i)=>{
    const [k,rng,t,d]=s;
    const isCenter=k==="X";
    const frame=isPanels&&(k==="F"||k==="F′");
    const depth=isPanels?(frame?0:1):Math.min(i,secs.length-1-i);
    const pair=isPanels?(frame?(k==="F"?secs.length-1:0):-1):(isCenter?-1:secs.length-1-i);
    rows+=`<div class="step${isCenter?" center":""}${frame?" frame":""}" data-i="${i}" data-pair="${pair}" style="margin-left:${depth*26}px" tabindex="0">
      <div class="chip">${k}</div>
      <div class="body"><div class="rng">${rng}</div><div class="t">${t}</div><div class="d">${d}</div></div>
    </div>`;
  });
  /* concentric glyph: one circle per pair + center dot */
  const nPairs=isPanels?2:Math.floor(secs.length/2);
  let circles="";
  for(let i=0;i<nPairs;i++){
    const rr=88-(i*(70/Math.max(nPairs,1)));
    circles+=`<circle class="gring" data-ring="${i}" cx="95" cy="95" r="${rr}"/>`;
  }
  const hasCenter=secs.some(s=>s[0]==="X");
  const glyph=`<svg viewBox="0 0 190 190" aria-hidden="true">${circles}${hasCenter?'<circle class="gcenter" cx="95" cy="95" r="7"/>':'<circle class="gcenter" cx="95" cy="95" r="4" opacity=".5"/>'}</svg>`;
  const refr=isPanels?`<div class="refrain">${r.refr}<small>${r.refrEn}</small></div>`:"";
  return `<div class="ringwrap">
    <div>
      ${refr?'<div class="panels">'+refr+'</div>':''}
      <div class="ladder" id="ladder">${rows}</div>
      <div class="pairnote" id="pairnote">Hover or tap a section to light up its mirror twin and see how they correspond.</div>
    </div>
    <div class="glyphbox">${glyph}<div class="cap">${isPanels?"Frame + panels: the outer ring holds repeated inner panels.":"Each circle = one mirrored pair (A/A′ outermost). The dot is the center X."}</div></div>
  </div>`;
}

function wireLadder(r){
  const steps=[...document.querySelectorAll('.step')];
  const note=document.getElementById('pairnote');
  const rings=[...document.querySelectorAll('.gring')];
  const isPanels=r.type==="panels";
  function ringIndexFor(i){
    if(isPanels) return (r.secs[i][0]==="F"||r.secs[i][0]==="F′")?0:1;
    return Math.min(i,r.secs.length-1-i);
  }
  function quoted(s){ return /^[“"]/.test(s) ? s : ('“'+s+'”'); }
  function activate(i){
    steps.forEach(s=>s.classList.remove('hl'));
    rings.forEach(c=>c.classList.remove('hl'));
    const p=parseInt(steps[i].dataset.pair);
    steps[i].classList.add('hl');
    const ri=ringIndexFor(i);
    const rc=rings.find(c=>+c.dataset.ring===ri); if(rc)rc.classList.add('hl');
    const a=r.secs[i];
    if(a[0]==="X"){
      note.innerHTML=`<em>${a[0]} — the center.</em> Everything folds around this: ${a[2]}`;
    }else if(p>=0&&r.secs[p]){
      steps[p].classList.add('hl');
      const b=r.secs[p];
      note.innerHTML=`<em>${a[0]} ⟷ ${b[0]}.</em> ${quoted(a[2])} mirrors ${quoted(b[2])}.`;
    }else{
      note.innerHTML=`<em>${a[0]}.</em> ${a[2]}`;
    }
  }
  steps.forEach((s,i)=>{
    s.addEventListener('mouseenter',()=>activate(i));
    s.addEventListener('focus',()=>activate(i));
    s.addEventListener('click',()=>activate(i));
  });
}

function render(){
  if(current===0){renderIntro();return;}
  const n=current,[nm,en,vc]=S[n-1],r=RINGS[n],st=statusOf(n);
  let html=`<div class="crumb">Surah ${n} of 114</div>
  <div class="head"><h2>${nm}</h2>${r&&r.ar?`<span class="ar">${r.ar}</span>`:""}</div>
  <div class="meta"><span>“${en}”</span><span>${vc} verses</span></div>
  <div class="meta" style="margin-top:10px">${tagHTML(n)}</div>`;
  if(PAIRS[n]) html+=`<p class="lede" style="font-size:13px;color:var(--muted)">${PAIRS[n]}</p>`;
  if(r){
    html+=`<p class="lede">${r.lede}</p>`+ladderHTML(r,n)+
      `<div class="card"><h3>Why these mirrors?</h3><p>${r.note}</p><div class="src">Source basis: ${r.src} Section boundaries vary slightly between analysts; treat verse ranges as approximate.</div></div>`;
  }else if(st==="cuy"){
    html+=`<div class="card"><h3>Mapped by Cuypers — not reproduced here</h3>
    <p>Michel Cuypers analyzed all of surahs 81–114 with Semitic rhetorical analysis (parallel, mirror, and concentric figures) in <i>A Qur'anic Apocalypse</i> (2018). He finds concentric or mirror composition at the level of verses and part-surahs throughout this final section of the Qur'an.</p>
    <p>His verse-by-verse schemes are too fine-grained (and too debated) to compress faithfully into one diagram, so this atlas shows his fully-worked short-surah examples at Q101 and Q112 as representatives, and marks the rest of 81–114 as “analyzed.”</p>
    <div class="src">See also Nicolai Sinai's review essay “Going Round in Circles” (JQS 2017) for the case against over-reading these structures.</div></div>`;
  }else if(st==="part"){
    html+=`<div class="card"><h3>Partial or proposed structure</h3><p>${PART_NOTES[n]}</p></div>`;
  }else{
    html+=`<div class="card"><h3>No published ring map — and that's worth saying plainly</h3>
    <p>No scholar has published a verified concentric (ring) analysis of this surah. That doesn't mean it lacks structure: the coherence tradition (Farāhī and Iṣlāḥī's <i>ʿamūd</i>, or central-theme, approach; Neuwirth's work on Meccan surah form; Robinson on the Medinan surahs) treats every surah as organized — just not necessarily as a ring.</p>
    <p>Popular websites sometimes publish ring diagrams for surahs like this one, but without peer review the mirrors are easy to force: with enough freedom in drawing section boundaries, almost any text can be made to look concentric. This atlas only diagrams what has a published scholarly basis.</p></div>`;
  }
  main.innerHTML=html;
  if(r) wireLadder(r);
}

function renderIntro(){
  const counts={ring:0,cuy:0,part:0,un:0};
  for(let n=1;n<=114;n++)counts[statusOf(n)]++;
  main.innerHTML=`
  <div class="crumb">Introduction</div>
  <div class="head"><h2>Ring Composition in the Qur'an</h2></div>
  <p class="lede">A <b>ring</b> (chiasmus / concentric composition) is a text that folds around its own middle: <b>A – B – C – X – C′ – B′ – A′</b>. The opening and closing mirror each other, the second and second-to-last mirror each other, and the most important idea sits at the <span style="color:var(--center)">center (X)</span> — not at the end, as modern readers expect. It's an ancient Near-Eastern architecture found in the Hebrew Bible, Homer, and — a growing body of scholarship argues — throughout the Qur'an.</p>
  <div class="stats">
    <div class="stat"><b>${counts.ring}</b><span>surahs with documented rings, fully diagrammed in this atlas</span></div>
    <div class="stat"><b>${counts.cuy}</b><span>more surahs (81–114) analyzed by Cuypers' rhetorical method</span></div>
    <div class="stat"><b>${counts.part}</b><span>surahs with partial / proposed structures</span></div>
    <div class="stat"><b>${counts.un}</b><span>surahs with no published ring map — honestly labeled</span></div>
  </div>
  <div class="card"><h3>The scholars</h3>
    <p><b>Ḥamīd al-Dīn al-Farāhī &amp; Amīn Aḥsan Iṣlāḥī</b> — the modern coherence (naẓm) tradition: every surah has a central pillar-theme (ʿamūd) and surahs come in pairs.</p>
    <p><b>Michel Cuypers</b> — Semitic Rhetorical Analysis: parallelism, mirror (ABC‖C′B′A′), and concentric (ABC-X-C′B′A′) figures at every scale. Book-length study of Q5 (<i>The Banquet</i>) and of Q81–114 (<i>A Qur'anic Apocalypse</i>).</p>
    <p><b>Raymond Farrin</b> — <i>Structure and Qur'anic Interpretation</i> (2014): ring analyses of Q1, Q2 and Q3, pairing across the whole Qur'an, and the claim that the entire book forms one grand concentric design.</p>
    <p><b>Neal Robinson, Angelika Neuwirth, Nevin Reda</b> — structural analyses of long surahs and Meccan surah form that ring theorists build on.</p>
  </div>
  <div class="card"><h3>Start with the showpieces</h3>
    <p>The five most famous rings: <a href="#" onclick="go(2);return false">Q2 al-Baqarah</a> (center: “a middle nation,” 2:143), <a href="#" onclick="go(12);return false">Q12 Yūsuf</a> (dream → vindication → fulfillment), <a href="#" onclick="go(5);return false">Q5 al-Māʾidah</a> (center: “to each a law and a way,” 5:48), <a href="#" onclick="go(1);return false">Q1 al-Fātiḥah</a> (pivot at v.5), and <a href="#" onclick="go(112);return false">Q112 al-Ikhlāṣ</a> (a four-line mirror). Refrain architectures: <a href="#" onclick="go(26);return false">Q26</a>, <a href="#" onclick="go(54);return false">Q54</a>, <a href="#" onclick="go(55);return false">Q55</a>.</p>
  </div>
  <div class="caveat"><b>Read this honestly.</b> Ring composition in the Qur'an is a live scholarly debate, not a settled fact. Nicolai Sinai's 2017 review argues that many of Cuypers' and Farrin's schemes rely on flexible section boundaries and selective emphasis — a careful reader "will have reason to doubt" a number of them. This atlas therefore diagrams only structures with a published basis, cites the analyst for each, and marks every unmapped surah as unmapped rather than inventing rings for all 114. Where you see a diagram, treat it as one scholar's argument about the text — a lens, not a decree.</div>
  <div class="card"><h3>How to read the diagrams</h3>
    <p>Sections are shown as an indented ladder: deeper indent = deeper inside the ring. <b>Hover or tap any section</b> to light up its mirror twin (teal) and see the correspondence; the concentric circles on the right show which "shell" of the ring you're in. The <span style="color:var(--center)">amber section</span> is always the center X.</p>
  </div>`;
}

document.getElementById('q').addEventListener('input',e=>buildNav(e.target.value));

/* deep-link support: #12 opens surah 12 directly */
function initFromHash(){
  const m = location.hash.match(/^#(\d{1,3})$/);
  const n = m ? parseInt(m[1],10) : 0;
  go((n>=1 && n<=114) ? n : 0, true);
}
window.addEventListener('hashchange', initFromHash);
buildNav();initFromHash();
</script>
